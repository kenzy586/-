<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة قصصي 📖✨</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #121212; color: #e0d6b8; text-align: center; padding: 50px; }
        .box { background-color: #1e1e1e; padding: 40px; border-radius: 15px; display: inline-block; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: right; }
        h1 { color: #ffb443; text-align: center; }
        h2 { color: #ffb443; border-bottom: 1px solid #ffb443; padding-bottom: 10px; }
        p { font-size: 18px; line-height: 1.8; text-align: justify; }
    </style>
</head>
<body>
    <div class="box">
        <h1>موقع قصصي الجديد 🌌📖</h1>
        
        <h2>عنوان قصتكِ الأولى هنا ✏️</h2>
        <p>
            اكتبي هنا أحداث قصتكِ الأولى سطر بسطر.. 
            تقدري تمسحي الكلام ده وتكتبي مكانه أي قصة أنتِ مألفاها، 
            والكلام هيتنسق ويظهر بشكل جميل جداً للقراء!
        </p>
        
    </div>
</body>
</html>
